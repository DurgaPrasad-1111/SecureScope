<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Admin</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 420px;
      padding: 28px;
      border-radius: 12px;
      background: #111827;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
      border: 1px solid #1f2937;
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    p { margin: 0 0 18px; color: #9ca3af; font-size: 0.95rem; }
    label { display:block; margin-bottom:6px; font-size:0.9rem; }
    input {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #0b1220;
      color: #e2e8f0;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 11px;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }
    .error {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #7f1d1d;
      border: 1px solid #b91c1c;
      color: #fee2e2;
      font-size: 0.9rem;
    }
    .info {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      background: #0f172a;
      border: 1px solid #1f2937;
      color: #cbd5f5;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/setup" autocomplete="off">
    <h1>Create Admin Account</h1>
    <p>One-time bootstrap for the first administrator.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if not setup_allowed %}
    <div class="info">Setup is disabled. If this is production, configure `SETUP_TOKEN` in your `.env`.</div>
    {% endif %}

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label for="username">Username</label>
    <input id="username" name="username" type="text" maxlength="64" required {% if not setup_allowed %}disabled{% endif %}>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" maxlength="150" required {% if not setup_allowed %}disabled{% endif %}>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required {% if not setup_allowed %}disabled{% endif %}>

    <label for="confirm_password">Confirm Password</label>
    <input id="confirm_password" name="confirm_password" type="password" required {% if not setup_allowed %}disabled{% endif %}>

    {% if token_required %}
    <label for="setup_token">Setup Token</label>
    <input id="setup_token" name="setup_token" type="password" required {% if not setup_allowed %}disabled{% endif %}>
    {% endif %}

    <button type="submit" {% if not setup_allowed %}disabled{% endif %}>Create Admin</button>
  </form>
</body>
</html>
